name: Naukri Job Agent

# ─────────────────────────────────────────────────────────────────────────────
#  SCHEDULE  (IST = UTC + 5:30)
#   10:00 AM IST  →  04:30 UTC
#   10:00 PM IST  →  16:30 UTC
# ─────────────────────────────────────────────────────────────────────────────
on:
  schedule:
    # - cron: '30 4 * * *'    # 10:00 AM IST only
    # - cron: '30 16 * * *'   # 10:00 PM IST only
    - cron: '30 */3 * * *'   # Every 3 hours at HH:30 UTC
  workflow_dispatch:           # Manual trigger button in GitHub Actions UI

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── 3. Chrome + Xvfb ─────────────────────────────────────────────────
      - name: Install Chrome dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            google-chrome-stable \
            xvfb \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libnss3 \
            libxss1
          sudo apt-get install -y libasound2 || sudo apt-get install -y libasound2t64 || true
          echo "✅ Chrome version: $(google-chrome --version)"

      # ── 4. Clean duplicate source files ──────────────────────────────────
      - name: Remove misplaced duplicate source files
        run: |
          rm -f src/main/java/com/jobagent/agent/WhatsAppNotifier.java
          echo "✅ Source tree clean."

      # ── 5. Debug — verify all secrets are loaded before build ─────────────
      #    Prints true/false only — never prints actual secret values
      - name: Verify secrets are set
        run: |
          echo "=== Secret presence check ==="
          [ -n "$GROQ_API_KEYS" ]      && echo "✅ GROQ_API_KEYS      is SET" || echo "❌ GROQ_API_KEYS      is MISSING"
          [ -n "$NAUKRI_USERNAME" ]    && echo "✅ NAUKRI_USERNAME    is SET" || echo "❌ NAUKRI_USERNAME    is MISSING"
          [ -n "$NAUKRI_PASSWORD" ]    && echo "✅ NAUKRI_PASSWORD    is SET" || echo "❌ NAUKRI_PASSWORD    is MISSING"
          [ -n "$TWILIO_ACCOUNT_SID" ] && echo "✅ TWILIO_ACCOUNT_SID is SET" || echo "❌ TWILIO_ACCOUNT_SID is MISSING"
          [ -n "$TWILIO_AUTH_TOKEN" ]  && echo "✅ TWILIO_AUTH_TOKEN  is SET" || echo "❌ TWILIO_AUTH_TOKEN  is MISSING"
          [ -n "$WHATSAPP_TO" ]        && echo "✅ WHATSAPP_TO        is SET" || echo "❌ WHATSAPP_TO        is MISSING"
          [ -n "$WHATSAPP_FROM" ]      && echo "✅ WHATSAPP_FROM      is SET" || echo "❌ WHATSAPP_FROM      is MISSING"

          # Show how many Groq keys are loaded (count only — never the values)
          COUNT=$(echo "$GROQ_API_KEYS" | tr ',' '\n' | grep -c 'gsk_' || true)
          echo "   GROQ key count: $COUNT"
        env:
          GROQ_API_KEYS:      ${{ secrets.GROQ_API_KEYS }}
          NAUKRI_USERNAME:    ${{ secrets.NAUKRI_USERNAME }}
          NAUKRI_PASSWORD:    ${{ secrets.NAUKRI_PASSWORD }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          WHATSAPP_TO:        ${{ secrets.WHATSAPP_TO }}
          WHATSAPP_FROM:      ${{ secrets.WHATSAPP_FROM }}

      # ── 6. Build with Maven ───────────────────────────────────────────────
      - name: Build with Maven
        run: |
          mvn -B package -DskipTests --no-transfer-progress
          echo "── Built jars ──"
          ls -lh target/*.jar 2>/dev/null || echo "No jars found in target/"

      # ── 7. Locate runnable jar ────────────────────────────────────────────
      - name: Locate jar
        run: |
          JAR=$(ls target/*.jar 2>/dev/null | grep -v 'original-' | head -1)
          if [ -z "$JAR" ]; then
            echo "❌ ERROR: No runnable jar found in target/"
            ls -lh target/ || true
            exit 1
          fi
          echo "JAR_PATH=$JAR" >> $GITHUB_ENV
          echo "✅ Runnable jar: $JAR"

      # ── 8. 🚀 Run Naukri Job Agent ─────────────────────────────────────────
      #
      #  ALL secrets passed as env vars directly into the java process.
      #  AppConfig.java reads them via System.getenv() in fallbackToEnv()
      #  and overrides the NA placeholder values from application.properties.
      #
      #  Flow:
      #    application.properties has → groq.api.keys=NA
      #    AppConfig sees NA → reads GROQ_API_KEYS env var → uses real keys ✅
      #
      - name: Run Naukri Job Agent
        run: |
          echo "Starting Xvfb virtual display..."
          Xvfb :99 -screen 0 1920x1080x24 -ac &
          XVFB_PID=$!
          sleep 3

          if ! kill -0 $XVFB_PID 2>/dev/null; then
            echo "❌ ERROR: Xvfb failed to start"
            exit 1
          fi
          echo "✅ Xvfb running (PID=$XVFB_PID)"
          echo "🚀 Running jar: $JAR_PATH"

          java \
            -Xmx512m \
            -Dfile.encoding=UTF-8 \
            -jar "$JAR_PATH" \
            --once 2>&1 | tee agent_run.log
          EXIT_CODE=${PIPESTATUS[0]}

          kill $XVFB_PID 2>/dev/null || true

          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Agent exited with code $EXIT_CODE"
            exit $EXIT_CODE
          else
            echo "✅ Agent completed successfully"
          fi
        env:
          DISPLAY: ':99'
          # ── 🔐 Secrets injected here — override NA in application.properties
          GROQ_API_KEYS:      ${{ secrets.GROQ_API_KEYS }}
          NAUKRI_USERNAME:    ${{ secrets.NAUKRI_USERNAME }}
          NAUKRI_PASSWORD:    ${{ secrets.NAUKRI_PASSWORD }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          WHATSAPP_TO:        ${{ secrets.WHATSAPP_TO }}
          WHATSAPP_FROM:      ${{ secrets.WHATSAPP_FROM }}

      # ── 9. Upload all artifacts (always runs, even on failure) ────────────
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: naukri-results-${{ github.run_number }}
          path: |
            naukri_job_matches.txt
            naukri_applied_jobs.log
            agent_run.log
            error_*.png
          retention-days: 7
# =============================================================
#  Naukri Job Agent v2 ? Master Configuration
#  Place at: src/main/resources/application.properties
#
#  ? SAFE TO COMMIT ? all secrets are blank placeholders here.
#  ? Real secret values are stored in GitHub Secrets and
#     injected at runtime as environment variables.
#
#  Secrets managed via GitHub ? Settings ? Secrets ? Actions:
#    NAUKRI_USERNAME    ? naukri.username
#    NAUKRI_PASSWORD    ? naukri.password
#    GROQ_API_KEYS      ? groq.api.keys
#    TWILIO_ACCOUNT_SID ? twilio.account.sid
#    TWILIO_AUTH_TOKEN  ? twilio.auth.token
#    WHATSAPP_TO        ? whatsapp.to
#    WHATSAPP_FROM      ? whatsapp.from  (optional)
#
#  For LOCAL development only: fill in values below directly.
#  Never commit a file with real values if repo is public.
# =============================================================


# ?? Naukri Credentials ????????????????????????????????????????
# ? NA ? loaded from GitHub Secret: NAUKRI_USERNAME
naukri.username=NA

# ? NA ? loaded from GitHub Secret: NAUKRI_PASSWORD
naukri.password=NA


# ?? Groq API (LLM) ???????????????????????????????????????????
# ? NA ? loaded from GitHub Secret: GROQ_API_KEYS
# Multiple keys comma-separated ? agent rotates on rate limit.
# Get free keys at: https://console.groq.com
groq.api.keys=NA

# LLM model ? llama-3.3-70b-versatile gives best quality on free tier
groq.model=llama-3.3-70b-versatile


# ?? CV ????????????????????????????????????????????????????????
# Path to your CV PDF ? relative to project root
cv.file.path=./src/main/resources/CV/Sumith_PA_CV17.pdf


# ?? Daemon Schedule ???????????????????????????????????????????
# How often the pipeline repeats in daemon mode (--once flag ignores this)
run.interval.hours=3


# ?? Job Search ????????????????????????????????????????????????
# Static fallback keywords (used when job.search.keywords.getFromCv=false)
job.search.keywords=automation testing java, Automation Architect, QA Lead, Automation Testing Lead, Head of Test Automation, Technical Lead Quality Assurance, Senior Software Engineer in Test

# City to search ? must match Naukri location field exactly
job.search.location=Bangalore

# Your years of experience ? used in Naukri SRP URL for experience filter
candidate.experience.years=13

# Max SRP pages to scrape per keyword (each page ~20 job cards)
job.search.max.pages=5

# File that persists seen Naukri job IDs across daemon runs
job.search.tracker.file=naukri_applied_jobs.log


# ?? Keyword Source ????????????????????????????????????????????
# true  ? Groq generates fresh keywords from your CV every run
# false ? use static list in job.search.keywords above
job.search.keywords.getFromCv=false

# Number of keywords Groq generates when getFromCv=true
job.search.keywords.count=10


# =============================================================
#  SRP FILTERS
# =============================================================

# Master filter switch
# true  ? apply all filters below
# false ? skip all filters (only location + experience via URL)
filters.apply=false

# true  ? Groq picks filter values from your CV automatically
# false ? use explicit values configured below
filters.getFromCv=false

# Work mode ? Allowed: Work from office | Hybrid | Remote
filters.workMode=Work from office, Hybrid

# Department
filters.department=Engineering - Software & QA

# Role Category
filters.roleCategory=Quality Assurance and Testing

# Company Type ? Allowed: Foreign MNC | Indian MNC | Corporate | Startup
filters.companyType=Foreign MNC, Indian MNC, Corporate

# Industry
filters.industry=IT Services & Consulting, Software Product

# Salary
filters.salary=25-50 Lakhs, 50-75 Lakhs

# Freshness ? single value only
filters.freshness=Last 15 days

# Posted By
filters.postedBy=Company Jobs, Consultant Jobs

# Top Companies whitelist (optional ? leave blank for no whitelist)
filters.topCompanies=

# Education (optional ? leave blank to skip)
filters.education=

# Delay between filter clicks (ms) ? lets Naukri XHR complete
filters.click.delay.ms=1200

# Retry count for stale checkbox clicks
filters.click.retries=3


# ?? Match Threshold ???????????????????????????????????????????
# Groq CV-match score (0-100) required to write job to output file
job.match.threshold.percent=60


# ?? Apply Behaviour ???????????????????????????????????????????
# true  ? agent clicks Apply / Easy Apply for matched jobs
# false ? collect and score only (safe for testing)
applyForJob=true

# Output file for matched / applied / external-redirect jobs
job.links.output.file=naukri_job_matches.txt


# ?? Console Output ????????????????????????????????????????????
# true  ? every rejected job printed to console with score
job.log.rejected=true


# ?? Browser ???????????????????????????????????????????????????
# true  ? headless Chrome (use on CI / servers / scheduled runs)
# false ? visible Chrome (use locally to verify login)
chrome.headless=true

# ?? Parallel Mode ?????????????????????????????????????????????
# true  ? multiple Chrome browsers, each handles a keyword slice
# false ? single browser sequential mode
parallel.enabled=true

# Number of parallel Chrome sessions (ignored when parallel.enabled=false)
# Rule of thumb: parallel.browsers <= number of groq.api.key
parallel.browsers=4


# ?? WhatsApp Notifications via Twilio ?????????????????????????
whatsapp.enabled=true

# ? NA ? loaded from GitHub Secret: TWILIO_ACCOUNT_SID
twilio.account.sid=NA

# ? NA ? loaded from GitHub Secret: TWILIO_AUTH_TOKEN
twilio.auth.token=NA

# ? NA ? loaded from GitHub Secret: WHATSAPP_TO  (your number with country code)
whatsapp.to=NA

# ? NA ? loaded from GitHub Secret: WHATSAPP_FROM  (Twilio sandbox number)
whatsapp.from=NA